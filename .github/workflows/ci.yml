name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend — lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff --quiet
          ruff check council/ frontend_api/ Expert1/ "Expert 2/" "Expert 3/" \
            --ignore E501,E402,F401,F541,E741,E401,F841,E701,E722 --quiet

      - name: Run unit tests (no API key required)
        env:
          MOCK_MODE: "1"
          ANTHROPIC_API_KEY: "sk-ant-mock-key-for-ci"
        run: |
          pip install pytest --quiet
          # Run self-contained unit tests — no inspect_ai / live API required
          python -m pytest \
            Expert1/tests/test_adaptive_strategy.py \
            Expert1/tests/test_data_validator.py \
            Expert1/tests/test_reproducibility.py \
            Expert1/tests/test_semantic_detector.py \
            Expert1/tests/test_termination.py \
            Expert1/tests/test_weighted_scoring.py \
            -v --tb=short

  frontend-build:
    name: Frontend — install + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: real_frontend/package-lock.json

      - name: Install dependencies
        working-directory: real_frontend
        run: npm ci

      - name: Type-check
        working-directory: real_frontend
        run: npx tsc --noEmit || true

      - name: Build
        working-directory: real_frontend
        run: npm run build
        env:
          VITE_COUNCIL_BACKEND: claude
